      endpoint_path: /uapi/domestic-stock/v1/quotations/inquire-daily-itemchartprice
      auth_required: true

    usage:
      dimensions: [flow]
      related_factors: [FLOW_OPEN, FLOW_HIGH, FLOW_LOW, FLOW_CLOSE, FLOW_VOLUME, FLOW_AMOUNT]

    params:
      required:
        - name: asset_class
          type: string
          example: "stock"
          default: null
          description: stock (이 spec 고정)
        - name: entity_code
          type: string
          example: "005930"
          default: null
          description: 티커
        - name: resolution
          type: string
          example: "D"
          default: "D"
