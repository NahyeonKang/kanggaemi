      freshness_check: true
      max_missing_ratio: 0.05
      required_fields: [entity_code, observation_date, close]
      sanity_checks:
        - high >= low
        - close > 0

    caveats:
      - 가격 단위 KRW(주식은 정수). 거래량 주, 거래대금 원.
      - volume/amount는 누적거래량/대금(해당 바의 EOD 합계 = 일 총량).
      - 수정주가 여부 adj 파라미터(0:수정주가 기본).
      - 한 호출 최대 100건, pagination 없음 → 긴 구간은 날짜 윈도우 반복.
