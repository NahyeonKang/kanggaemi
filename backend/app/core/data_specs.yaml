      frequency: daily
      timezone: Asia/Seoul
      unit:
        open: KRW
        high: KRW
        low: KRW
        close: KRW
        volume: shares
        amount: KRW
      cumulative_type: daily
      is_estimated: false
      update_timing: 장 마감 후 확정(당일 바는 진행 중일 수 있음)
      expected_lag: EOD
      history_available: 한 호출 최대 100건(윈도우 반복 필요)

    output_schema:
      primary_key: [source, asset_class, entity_code, resolution, observation_date]
      datetime_field: observation_date
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "kis"
        - name: asset_class
          type: string
          nullable: false
          unit: null
          description: "stock"
        - name: entity_code
          type: string
          nullable: false
          unit: null
          description: 티커
        - name: resolution
          type: string
          nullable: false
          unit: null
          description: D|W|M|Y
        - name: observation_date
          type: date
          nullable: false
          unit: null
          description: 영업일 YYYY-MM-DD
        - name: open
          type: float
          nullable: true
          unit: KRW
          description: 시가
        - name: high
          type: float
          nullable: true
          unit: KRW
          description: 고가
        - name: low
          type: float
          nullable: true
          unit: KRW
          description: 저가
        - name: close
          type: float
          nullable: true
          unit: KRW
          description: 종가
        - name: volume
          type: float
          nullable: true
          unit: shares
          description: 누적 거래량(당일 합계)
        - name: amount
          type: float
          nullable: true
          unit: KRW
          description: 누적 거래대금(당일 합계)
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

