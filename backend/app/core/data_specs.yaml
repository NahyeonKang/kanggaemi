version: "0.1.0"
updated_at: "2026-06-28"

# 에이전트 factor node가 사용하는 데이터 계약서.
# 논리적 데이터셋 단위로 DataSpec 정의. (함수 목록이 아님)
# 공통 caveat: 모든 EOD 적재는 (observation_date=event date) + (ingested_at=transaction
#   time)을 보유. 장중 스냅샷 계열은 (observed_at=valid time) 추가 보유 → as_of 조회 가능.

data_specs:

  # ===================================================================
  # FX (환율) — KB USD/KRW
  # ===================================================================
  - data_spec_id: DS_FX_USDKRW_DAILY
    name: USD/KRW 일별 매매기준율
    description: KB 고시 USD/KRW 일별 매매기준율(base_rate) 시계열.
    status: active

    source:
      provider: KB
      source_type: web_scraping
      module: app.scrapers.exchange_rate.kb_exchange_rate_scraper
      function: fetch_usdkrw_range
      endpoint_name: KB 외환 고시 (기간 조회, 조회기준=2)
      endpoint_path: https://obank.kbstar.com/quics
      auth_required: false

    usage:
      dimensions: [macro]
      related_factors: [MACRO_FX_USDKRW]

    params:
      required:
        - name: start_date
          type: string
          example: "20260601"
          default: null
          description: 조회 시작일 YYYYMMDD
        - name: end_date
          type: string
          example: "20260628"
          default: null
          description: 조회 종료일 YYYYMMDD
      optional:
        - name: base_ccy
          type: string
          example: "USD"
          default: "USD"
          description: 기준통화. 생략 시 USD.
        - name: quote_ccy
          type: string
          example: "KRW"
          default: "KRW"
          description: 상대통화. 생략 시 KRW.

    data_contract:
      grain: macro_date
      frequency: daily
      timezone: Asia/Seoul
      unit:
        base_rate: KRW
      cumulative_type: daily
      is_estimated: false
      update_timing: KB 고시 시점(영업일 마감 기준)
      expected_lag: 영업일 마감 후
      history_available: 소스 제공 범위(요청 구간)

    output_schema:
      primary_key: [source, base_ccy, quote_ccy, quote_date]
      datetime_field: quote_date
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "KB"
        - name: base_ccy
          type: string
          nullable: false
          unit: null
          description: 기준통화 "USD"
        - name: quote_ccy
          type: string
          nullable: false
          unit: null
          description: 상대통화 "KRW"
        - name: quote_date
          type: date
          nullable: false
          unit: null
          description: 거래일 YYYY-MM-DD (event date)
        - name: base_rate
          type: float
          nullable: false
          unit: KRW
          description: 매매기준율
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC, transaction time)

    validation:
      freshness_check: true
      max_missing_ratio: 0.05
      required_fields: [quote_date, base_rate]
      sanity_checks:
        - base_rate > 0
        - base_rate between 500 and 3000

    caveats:
      - 가격 단위 KRW. timezone KST.
      - base_rate는 거래일당 1건, 정정 사실상 없음 → upsert(값 변동 시 갱신).
      - HTML 스크래핑이라 KB 페이지 구조 변경 시 파서 깨질 수 있음.
      - 날짜 기준 = 거래일(영업일).
    notes:
      - 사내 PC 프록시/방화벽이 KB 요청을 막으면 수집 실패 가능(네트워크 이슈).

  - data_spec_id: DS_FX_USDKRW_INTRADAY
    name: USD/KRW 장중 요약 스냅샷
    description: KB 장중 first/last/low/high/avg 요약을 fetch마다 append하는 스냅샷 시계열.
    status: active

    source:
      provider: KB
      source_type: web_scraping
      module: app.scrapers.exchange_rate.kb_exchange_rate_scraper
      function: fetch_usdkrw_summary
      endpoint_name: KB 외환 고시 (장중 요약, 조회기준=1)
      endpoint_path: https://obank.kbstar.com/quics
      auth_required: false

    usage:
      dimensions: [macro]
      related_factors: [MACRO_FX_USDKRW]

    params:
      required:
        - name: target_date
          type: string
          example: "20260619"
          default: null
          description: 조회 거래일 YYYYMMDD
      optional:
        - name: base_ccy
          type: string
          example: "USD"
          default: "USD"
          description: 기준통화. 생략 시 USD.
        - name: quote_ccy
          type: string
          example: "KRW"
          default: "KRW"
          description: 상대통화. 생략 시 KRW.


    data_contract:
      grain: macro_datetime
      frequency: intraday
      timezone: Asia/Seoul
      unit:
        first_rate: KRW
        last_rate: KRW
        daily_low: KRW
        daily_high: KRW
        daily_avg: KRW
      cumulative_type: intraday_snapshot
      is_estimated: false
      update_timing: 장중 폴링 시점마다
      expected_lag: near-realtime(폴링 주기)
      history_available: 적재한 스냅샷 한도

    output_schema:
      primary_key: [source, base_ccy, quote_ccy, target_date, observed_at]
      datetime_field: observed_at
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "KB"
        - name: base_ccy
          type: string
          nullable: false
          unit: null
          description: 기준통화 "USD"
        - name: quote_ccy
          type: string
          nullable: false
          unit: null
          description: 상대통화 "KRW"
        - name: target_date
          type: date
          nullable: false
          unit: null
          description: 거래일 YYYY-MM-DD (event date)
        - name: observed_at
          type: datetime
          nullable: false
          unit: null
          description: 스냅샷 유효 시점(KST, valid time)
        - name: first_rate
          type: float
          nullable: true
          unit: KRW
          description: 최초회차
        - name: last_rate
          type: float
          nullable: true
          unit: KRW
          description: 최종회차
        - name: daily_low
          type: float
          nullable: true
          unit: KRW
          description: 일중 최저
        - name: daily_high
          type: float
          nullable: true
          unit: KRW
          description: 일중 최고
        - name: daily_avg
          type: float
          nullable: true
          unit: KRW
          description: 일중 평균
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.1
      required_fields: [target_date, observed_at, last_rate]
      sanity_checks:
        - daily_high >= daily_low
        - last_rate > 0

    caveats:
      - as_of 조회는 observed_at 기준.
      - append-only. 같은 (key, observed_at) 재수집은 멱등 skip.
      - 가격 단위 KRW, timezone KST.
    notes: []

  # ===================================================================
  # 금리 (Yield)
  # ===================================================================
  - data_spec_id: DS_RATE_KR_TREASURY
    name: 한국 금리 일별(국고채/단기금리)
    description: BOK ECOS 일별 KR 금리(KOFR/3Y/10Y/30Y/CD91/회사채AA-) 종가 시계열.
    status: active

    source:
      provider: BOK
      source_type: api
      module: app.scrapers.bok.bok_scraper
      function: fetch_last_1y_series
      endpoint_name: ECOS StatisticSearch (817Y002)
      endpoint_path: https://ecos.bok.or.kr/api/StatisticSearch
      auth_required: true

    usage:
      dimensions: [macro]
      related_factors: [RATE_KR_GOV_3Y, RATE_KR_GOV_10Y, RATE_KR_GOV_30Y, RATE_KR_US_SPREAD]

    params:
      required:
        - name: country
          type: string
          example: "KR"
          default: null
          description: 국가(서비스 라우팅 키)
        - name: tenor
          type: string
          example: "10Y"
          default: null
          description: KOFR | 3Y | 10Y | 30Y | CD91 | CORP3Y_AA
        - name: start_date
          type: string
          example: "2026-07-01"
          default: null
          description: 조회 시작일
        - name: end_date
          type: string
          example: "2026-07-03"
          default: null
          description: 조회 종료일
      optional: []

    data_contract:
      grain: macro_date
      frequency: daily
      timezone: Asia/Seoul
      unit:
        close: percent
      cumulative_type: daily
      is_estimated: false
      update_timing: ECOS 업데이트 주기(영업일)
      expected_lag: 1영업일 내외(가능)
      history_available: 약 365일(fetch_last_1y)

    output_schema:
      primary_key: [source, country, tenor, resolution, observation_date]
      datetime_field: observation_date
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "bok"
        - name: country
          type: string
          nullable: false
          unit: null
          description: "KR"
        - name: tenor
          type: string
          nullable: false
          unit: null
          description: 만기 라벨
        - name: resolution
          type: string
          nullable: false
          unit: null
          description: D (월간 M 추가 가능)
        - name: observation_date
          type: date
          nullable: false
          unit: null
          description: 관측일 YYYY-MM-DD
        - name: close
          type: float
          nullable: true
          unit: percent
          description: 금리(%)
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.05
      required_fields: [observation_date, close]
      sanity_checks:
        - close between -2 and 20

    caveats:
      - 금리 단위 percent. tenor→ECOS item_code 매핑은 service에 정의.
      - 금리 데이터는 정정 가능성 있음(현재 light upsert, versioned 미적용).
      - resolution 월간(M) 추가 시 BOK 월간 TIME(YYYYMM) 날짜 포맷 처리 필요.
    notes:
      - ECOS_API_KEY 필요(.env).

  - data_spec_id: DS_RATE_US_TREASURY
    name: 미국 금리 일별
    description: FRED 일별 US 금리(SOFR/2Y/10Y/30Y) 종가 시계열.
    status: active

    source:
      provider: FRED
      source_type: api
      module: app.scrapers.fred.fred_scraper
      function: fetch_last_1y_series
      endpoint_name: FRED series/observations
      endpoint_path: https://api.stlouisfed.org/fred/series/observations
      auth_required: true

    usage:
      dimensions: [macro]
      related_factors: [RATE_US_2Y, RATE_US_10Y, RATE_US_30Y, RATE_US_5Y, RATE_SOFR, RATE_KR_US_SPREAD]

    params:
      required:
        - name: country
          type: string
          example: "US"
          default: null
          description: 국가(서비스 라우팅 키)
        - name: tenor
          type: string
          example: "10Y"
          default: null
          description: SOFR | 2Y | 10Y | 30Y
        - name: start_date
          type: string
          example: "2026-07-01"
          default: null
          description: 조회 시작일
        - name: end_date
          type: string
          example: "2026-07-03"
          default: null
          description: 조회 종료일
      optional: []

    data_contract:
      grain: macro_date
      frequency: daily
      timezone: America/New_York
      unit:
        close: percent
      cumulative_type: daily
      is_estimated: false
      update_timing: FRED 릴리스(미국장 기준)
      expected_lag: 1영업일 내외
      history_available: 약 365일(fetch_last_1y)

    output_schema:
      primary_key: [source, country, tenor, resolution, observation_date]
      datetime_field: observation_date
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "fred"
        - name: country
          type: string
          nullable: false
          unit: null
          description: "US"
        - name: tenor
          type: string
          nullable: false
          unit: null
          description: 만기 라벨(FRED series_id 매핑)
        - name: resolution
          type: string
          nullable: false
          unit: null
          description: "D"
        - name: observation_date
          type: date
          nullable: false
          unit: null
          description: 관측일 YYYY-MM-DD
        - name: close
          type: float
          nullable: true
          unit: percent
          description: 금리(%). 결측("." )은 null
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.05
      required_fields: [observation_date]
      sanity_checks:
        - close between -2 and 20

    caveats:
      - 금리 단위 percent. FRED 결측값은 "." → null 저장.
      - timezone은 소스(미국) 기준. 적재 ingested_at은 UTC.
    notes:
      - FRED_API_KEY 필요(.env).

  - data_spec_id: DS_RATE_KR_INTRADAY
    name: 한국 금리 장중 스냅샷(KIS)
    description: KIS comp-interest 1콜로 받은 국내채권 금리 종합을 (country,tenor)별 append 스냅샷.
    status: active

    source:
      provider: KIS
      source_type: api
      module: app.scrapers.kis.kis_scraper
      function: fetch_comp_interest
      endpoint_name: 국내채권 금리 종합 (comp-interest)
      endpoint_path: /uapi/domestic-stock/v1/quotations/comp-interest
      auth_required: true

    usage:
      dimensions: [macro]
      related_factors: [RATE_KR_GOV_3Y, RATE_KR_GOV_10Y, RATE_KR_GOV_30Y, RATE_KR_CD91, RATE_KR_CORP3Y_AA]

    params:
      required:
        - name: country
          type: string
          example: "KR"
          default: null
          description: 국가(서비스 라우팅 키)
        - name: tenor
          type: string
          example: "10Y"
          default: null
          description: 3Y|10Y|30Y|CD91|CORP3Y_AA
      optional: []

    data_contract:
      grain: macro_datetime
      frequency: intraday
      timezone: Asia/Seoul
      unit:
        current_rate: percent
        prdy_vrss: percent
        prdy_ctrt: percent
      cumulative_type: intraday_snapshot
      is_estimated: false
      update_timing: 장중 폴링
      expected_lag: near-realtime
      history_available: 적재 스냅샷 한도

    output_schema:
      primary_key: [source, country, tenor, observed_at]
      datetime_field: observed_at
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "kis"
        - name: country
          type: string
          nullable: false
          unit: null
          description: "KR"
        - name: tenor
          type: string
          nullable: false
          unit: null
          description: 3Y|10Y|30Y|CD91|CORP3Y_AA (KIS bcdt_code 매핑)
        - name: observed_at
          type: datetime
          nullable: false
          unit: null
          description: 스냅샷 시점(KST)
        - name: current_rate
          type: float
          nullable: true
          unit: percent
          description: 현재 금리
        - name: prdy_vrss_sign
          type: string
          nullable: true
          unit: null
          description: 전일대비 부호
        - name: prdy_vrss
          type: float
          nullable: true
          unit: percent
          description: 전일대비
        - name: prdy_ctrt
          type: float
          nullable: true
          unit: percent
          description: 전일대비율
        - name: base_date
          type: string
          nullable: true
          unit: null
          description: KIS 기준일(stck_bsop_date)
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.1
      required_fields: [country, tenor, observed_at]
      sanity_checks:
        - current_rate between -2 and 20

    caveats:
      - 장중 스냅샷. 단위 percent.
      - KIS 1콜로 전 종목 반환 → service가 bcdt_code 필터링.
    notes:
      - KIS OAuth 토큰 필요(KISAuthClient).

  # ===================================================================
  # 매크로 지표 (FRED)
  # ===================================================================
  - data_spec_id: DS_MACRO_US_CORE
    name: 핵심 매크로/시장 지표(FRED)
    description: 달러지수·BEI·실질금리·SOX·VIX 등 FRED 코어 지표 일별 관측.
    status: active

    source:
      provider: FRED
      source_type: api
      module: app.scrapers.fred.fred_scraper
      function: fetch_last_1y_series
      endpoint_name: FRED series/observations
      endpoint_path: https://api.stlouisfed.org/fred/series/observations
      auth_required: true

    usage:
      dimensions: [macro, industry]
      related_factors: [MACRO_DOLLAR_INDEX, RATE_US_BEI_10Y, RATE_US_REAL_10Y, RATE_FED_FUNDS, VOL_VIX, SOX_INDEX]

    params:
      required:
        - name: series_id
          type: string
          example: "VIXCLS"
          default: null
          description: DTWEXBGS|T10YIE|DFII10|NASDAQSOX|VIXCLS|FEDFUNDS
        - name: start_date
          type: string
          example: "2026-06-01"
          default: null
          description: 조회 시작일 YYYY-MM-DD
        - name: end_date
          type: string
          example: "2026-06-28"
          default: null
          description: 조회 종료일 YYYY-MM-DD
      optional:
        - name: resolution
          type: string
          example: "D"
          default: "D"
          description: D, M (월간 M 추가 가능)
    data_contract:
      grain: macro_date
      frequency: daily
      timezone: America/New_York
      unit:
        value: mixed
      cumulative_type: daily
      is_estimated: false
      update_timing: FRED 릴리스
      expected_lag: 1영업일 내외
      history_available: 약 365일

    output_schema:
      primary_key: [source, series_id, resolution, observation_date]
      datetime_field: observation_date
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "fred"
        - name: series_id
          type: string
          nullable: false
          unit: null
          description: FRED 시리즈 ID
        - name: resolution
          type: string
          nullable: false
          unit: null
          description: D (월간 M 추가 가능)
        - name: observation_date
          type: date
          nullable: false
          unit: null
          description: 관측일 YYYY-MM-DD
        - name: value
          type: float
          nullable: true
          unit: mixed
          description: 지표값(시리즈별 단위 상이)
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.1
      required_fields: [series_id, observation_date]
      sanity_checks: []

    caveats:
      - 단위가 시리즈마다 다름 → unit "mixed". 해석 시 series_id별로 분기 필요.
        (DTWEXBGS:index, T10YIE/DFII10:percent, NASDAQSOX:index/pt, VIXCLS:pt)
      - 결측("." )은 null.
    notes:
      - 시리즈마다 단위 확인 필요.

  # ===================================================================
  # 투자자 수급 (KIS)
  # ===================================================================
  - data_spec_id: DS_KR_MARKET_INVESTOR_FLOW
    name: 시장별 투자자 매매동향(일별)
    description: 코스피/코스닥 시장 투자자유형별 순매수(수량/대금) 일별.
    status: active

    source:
      provider: KIS
      source_type: api
      module: app.scrapers.kis.kis_investor_scraper
      function: fetch_market_investor_daily
      endpoint_name: 시장별 투자자매매동향(일별) [국내주식-075]
      endpoint_path: /uapi/domestic-stock/v1/quotations/inquire-investor-daily-by-market
      auth_required: true

    usage:
      dimensions: [flow]
      related_factors: [FLOW_FOREIGN_SPOT, FLOW_INSTITUTION_SPOT, FLOW_INDIVIDUAL_SPOT]

    params:
      required:
        - name: market
          type: string
          example: "KOSPI"
          default: null
          description: KOSPI | KOSDAQ (→ KSP/KSQ)
        - name: start_date
          type: string
          example: "2026-06-01"
          default: null
