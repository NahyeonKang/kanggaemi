          description: 미결제약정 증감 (0.00)
        - name: theoretical_price
          type: float
          nullable: true
          unit: pt
          description: 이론가
        - name: disparity
          type: float
          nullable: true
          unit: percent
          description: 괴리율
        - name: tick_strength
          type: float
          nullable: true
          unit: null
          description: 당일 체결강도 (0.0000)
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.1
      required_fields: [entity_code, observed_at]
      sanity_checks:
        - open_interest >= 0 or open_interest is null

    caveats:
      - output1(현재 시점) 1건만 → append-only 스냅샷. as_of=observed_at.
      - basis, kospi200, OI, OI Change, tick strength null
    notes: []

# ===================================================================
  # 해외선물 (KIS 해외선물옵션)
  # ===================================================================
  - data_spec_id: DS_OVERSEAS_FUTURES_DAILY
    name: 해외선물 체결추이(일간)
    description: KIS 해외선물 일간 OHLCV(거래소·종목별). daily-ccnl output2를 instrument_ohlcv(asset_class=os_future)에 적재.
    status: active

    source:
      provider: KIS
      source_type: api
      module: app.scrapers.kis.kis_overseas_futures_scraper
      function: fetch_daily_ohlcv
      endpoint_name: 해외선물 체결추이(일간) [해외선물-018]
      endpoint_path: /uapi/overseas-futureoption/v1/quotations/daily-ccnl
      auth_required: true

    usage:
      dimensions: [macro]
      related_factors: [CMDT_WTI, CMDT_BRENT, CMDT_GOLD, CMDT_COPPER, CMDT_NATURALGAS]

    params:
      required:
        - name: exch_cd
          type: string
          example: "CME"
          default: null
          description: 거래소코드(ffcode.mst 거래소코드). srs_cd와 짝이 맞아야 함
        - name: srs_cd
          type: string
          example: "6AM24"
          default: null
          description: 종목코드(품목+월물, 예 6A+M24)
        - name: close_date
          type: string
          example: "20240424"
          default: null
          description: 조회종료일 YYYYMMDD. 이 날짜에서 과거로 페이징
      optional:
        - name: qry_cnt
          type: integer
          example: 40
          default: 40
          description: 콜당 요청 건수(최대 40)
        - name: calc_decimal
          type: integer
          example: -4
          default: null
          description: sCalcDesz(계산소수점). 미지정 시 마스터 자동 조회, 없으면 raw 저장
        - name: currency
          type: string
          example: "USD"
          default: null
          description: 상품 통화. 미지정 시 마스터 자동 조회

    data_contract:
      grain: asset_date
      frequency: daily
      timezone: exchange_local
      unit:
        open: product_price
        high: product_price
        low: product_price
        close: product_price
        volume: contracts
      cumulative_type: daily
      is_estimated: false
      update_timing: 익일(CME/SGX 유료시세 가입 후)
      expected_lag: T+1
      history_available: close_date 기준 과거로 INDEX_KEY 페이징(콜당 최대 40)

    output_schema:
      primary_key: [source, asset_class, entity_code, resolution, observation_date]
      datetime_field: observation_date
      fields:
        - name: source
          type: string
          nullable: false
          unit: null
          description: "kis"
        - name: asset_class
          type: string
          nullable: false
          unit: null
          description: "os_future"
        - name: entity_code
          type: string
          nullable: false
          unit: null
          description: 'EXCH:SRS 합성 코드(예 CME:6AM24)'
        - name: resolution
          type: string
          nullable: false
          unit: null
          description: D 고정(해외선물 daily-ccnl은 일간만)
        - name: observation_date
          type: date
          nullable: false
          unit: null
          description: 거래일 YYYY-MM-DD (data_date)
        - name: open
          type: float
          nullable: true
          unit: product_price
          description: 시가(open_price). sCalcDesz 보정 필요
        - name: high
          type: float
          nullable: true
          unit: product_price
          description: 고가(high_price). sCalcDesz 보정 필요
        - name: low
          type: float
          nullable: true
          unit: product_price
          description: 저가(low_price). sCalcDesz 보정 필요
        - name: close
          type: float
          nullable: true
          unit: product_price
          description: 종가(last_price=체결가). sCalcDesz 보정 필요
        - name: volume
          type: float
          nullable: true
          unit: contracts
          description: 누적 거래수량(vol)
        - name: amount
          type: float
          nullable: true
          unit: null
          description: 거래대금 — daily-ccnl 미제공(항상 null)
        - name: currency
          type: string
          nullable: true
          unit: null
          description: 상품 통화(마스터 주입, 예 USD). 미주입 시 null
        - name: ingested_at
          type: datetime
          nullable: false
          unit: null
          description: 적재 시각(UTC)

    validation:
      freshness_check: true
      max_missing_ratio: 0.1
      required_fields: [entity_code, observation_date, close]
      sanity_checks:
        - high >= low
        - close > 0

    caveats:
      - "★ sCalcDesz(계산소수점) 보정 필수: 원시 시세는 ffcode.mst 계산소수점만큼 소수점 이동 필요(예 6A=-4 → 6882.5→0.68825). calc_decimal 미지정 시 raw 저장."
      - feed 내부 불일치 가능(일부 행은 이미 보정·일부는 미보정). 심볼별 마스터 대조 검증 권장.
      - 통화(currency)는 ffcode.mst에 없음 → 마스터에 별도 주입(--currency-json/수기).
      - 거래대금(amount) 미제공 → null. 거래량은 누적거래수량(vol), 단위 contracts.
      - entity_code는 "EXCH:SRS" 합성 코드. asset_class=os_future.
      - "페이징: tr_cont 불가 → INDEX_KEY(QRY_TP Q→P), 콜당 최대 40건, close_date에서 과거 방향."
      - CME/SGX는 유료시세(가입 후 익일부터 조회 가능).
      - 만기물 코드(예 6AM24)는 만기 후 조회 불가 → 현재 월물 사용.
    notes:
      - calc_decimal/currency는 overseas_future_master(ffcode.mst)에서 resolve.