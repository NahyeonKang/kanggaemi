version: "0.1.0"
updated_at: "2026-06-28"

# ── asset_class taxonomy (STATIC CONFIG, 권위) ──────────────────────────
# 닫힌 집합. LLM이 생성/변형하지 않음(controlled vocabulary).
# factor_catalog.yaml가 이 asset_class 값을 키로 참조한다.
#
# 역할 분리:
#   - 이 파일       : asset_class별 "정책"(적용 dimension, 코드 포맷).
#   - asset_taxonomy: 질의에 등장한 "개별 인스턴스"(티커/업종코드…)를 검증해 캐시.
#     인스턴스는 asset_class만 참조하고, dimension은 여기서 끌어쓴다.

classes:
  - asset_class: kr_equity
    description: 국내 상장 개별주식
    region: kr
    markets: [KOSPI, KOSDAQ]
    entity_code_format: "6-digit 종목코드 (예: 005930)"
    entity_code_source: KIS kospi_code.mst, kosdaq_code.mst
    applicable_dimensions: [macro, flow, industry, valuation]
    default_horizon: 3M
    caveats:
      - macro는 직접 적용하지 않고 kr_index 시장 backdrop으로 참조.
    status: active

  - asset_class: us_equity
    description: 미국 상장 개별주식
    region: us
    markets: [NYSE, NASDAQ]
    entity_code_format: "ticker symbol (예: AAPL)"
    entity_code_source: KIS nasmst.cod, nysmst.cod
    applicable_dimensions: [macro, industry, valuation]
    default_horizon: 1Y
    caveats:
      - macro는 직접 적용하지 않고 us_index 시장 backdrop으로 참조.
    status: active

  - asset_class: kr_index
    description: 국내 지수
    region: kr
    markets: [KOSPI, KOSDAQ]
    entity_code_format: "지수/업종 = 4-digit 업종코드(예: 0001)"
    entity_code_source: KIS 업종코드 idxcode.mst
    applicable_dimensions: [macro, flow, valuation]
    default_horizon: 3M
    caveats:
      - 선물/옵션 entity_code는 만기마다 변경됨 → 캐시 재검증 필요(verified_at 갱신).
    status: active

  - asset_class: us_index
    description: 미국 지수
    region: us
    markets: [NYSE, NASDAQ]
    entity_code_format: "index/series symbol (예: QNDAQ)"
    entity_code_source: KIS 해외지수코드 frgn_code.mst
    applicable_dimensions: [macro, valuation]
    default_horizon: 1Y
    caveats:
      - 금리/달러/VIX/SOX/실질금리/BEI는 active. 유가·금·원자재·Fed Funds·5Y 미수집.
      - 지수 밸류에이션(PER/PBR/ROE) 미수집.
    status: active

  - asset_class: fx
    description: 외환(현재 USD/KRW)
    region: kr
    markets: []
    entity_code_format: "currency pair (예: USDKRW)"
    entity_code_source: 고정 페어(스크래퍼 내장)
    applicable_dimensions: [macro]
    default_horizon: 1M
    caveats:
      - 현재 USD/KRW만. 타 통화 확장 시 스크래퍼/스펙 추가 필요.
    status: active

  - asset_class: commodity
    description: 원자재(유가/금/구리 등)
    region: global
    markets: []
    entity_code_format: "symbol (예: BZU26)"
    entity_code_source: KIS 해외선물코드 ffcode.mst
    applicable_dimensions: [macro]
    default_horizon: 3M
    caveats:
      - 전량 미수집. factor_catalog의 CMDT_* draft에 대응. 수집 파이프라인 추가 필요.
    status: active