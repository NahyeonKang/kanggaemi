services:
  db:
    image: postgres:17
    container_name: kanggaemi-db
    environment:
      POSTGRES_USER: kanggaemi
      POSTGRES_PASSWORD: kanggaemi_dev_pw
      POSTGRES_DB: kanggaemi
    ports:
      - "5432:5432"
    volumes:
      - kanggaemi_pgdata:/var/lib/postgresql/data
volumes:
  kanggaemi_pgdata: